<!doctype html>
<html>
<head>
  <title>Join FemiFresh</title>
  <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/femifresh-unified.css">
  <link rel="stylesheet" href="/css/affiliate-premium.css">
  <script src="/js/manual-affiliate-payment-safe.js"></script>\n</head>
<body>




<main class="affiliate-page">
  <section class="container affiliate-wrap">
    
    </div>

    <form class="affiliate-card" onsubmit="registerAffiliate(event)">
      <h2>Create account</h2>
      <input name="firstName" placeholder="First name" required>
      <input name="lastName" placeholder="Last name" required>
      <input name="phone" placeholder="Phone" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <input name="sponsorCode" id="sponsorCode" placeholder="Sponsor code optional">
      
      <p>Already joined? <a href="/login">Login</a></p>
    </form>
  </section>
</main>

<script>
const ref = new URLSearchParams(location.search).get("ref");
if (ref) document.getElementById("sponsorCode").value = ref;

async function registerAffiliate(e) {
  e.preventDefault();
  const body = {};
  new FormData(e.target).forEach((value, key) => body[key] = value);

  const res = await fetch("/api/affiliate/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  const data = await res.json();

  if (!data.success) {
    alert(data.message || "Registration failed.");
    return;
  }

  localStorage.setItem("ff_affiliate_token", data.token);
  localStorage.setItem("ff_affiliate", JSON.stringify(data.affiliate));
  location.href = data.checkoutUrl;
}
</script>


  
<div class="MANUAL_PAYMENT_NOTICE_SAFE_V1" style="max-width:680px;margin:20px auto 40px;padding:18px 20px;border-radius:22px;background:#fff1fa;border:1px solid rgba(104,35,95,.15);color:#35112f;font-family:Inter,system-ui;">
  <strong>Manual joining fee payment</strong><br>
  After creating your account, pay the once-off <strong>R100 joining fee</strong> manually and email proof to <strong>femifresh02@gmail.com</strong>. Use your registered affiliate email as reference.
</div>
</body>
</html>
