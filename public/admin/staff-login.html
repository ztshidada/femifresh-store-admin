<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Staff Login | FemiFresh</title>
  <link rel="icon" href="/images/femifresh-logo.jpg">
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:
        radial-gradient(circle at 8% 12%,rgba(244,167,216,.30),transparent 28%),
        radial-gradient(circle at 90% 16%,rgba(104,35,95,.12),transparent 26%),
        linear-gradient(180deg,#fff8fd,#fff1fa 55%,#fffaf7);
      color:#241126;
      padding:20px;
    }
    .card{
      width:min(460px,100%);
      background:white;
      border:1px solid rgba(104,35,95,.14);
      border-radius:34px;
      padding:34px;
      box-shadow:0 22px 60px rgba(104,35,95,.12);
    }
    img{
      width:86px;
      height:86px;
      object-fit:cover;
      border-radius:24px;
      margin-bottom:18px;
    }
    h1{
      margin:0 0 12px;
      color:#35112f;
      font-size:clamp(42px,8vw,64px);
      line-height:.95;
      letter-spacing:-.07em;
    }
    p{
      color:#6f6372;
      line-height:1.6;
    }
    form{
      display:grid;
      gap:14px;
      margin-top:22px;
    }
    input{
      min-height:54px;
      border:1px solid rgba(104,35,95,.14);
      border-radius:16px;
      padding:14px 16px;
      font-size:16px;
    }
    button{
      min-height:54px;
      border:0;
      border-radius:999px;
      background:linear-gradient(135deg,#68235f,#9b358e,#f4a7d8);
      color:white;
      font-weight:950;
      font-size:16px;
      cursor:pointer;
    }
    .error{
      display:none;
      background:#ffe1e8;
      color:#8a0020;
      padding:14px;
      border-radius:16px;
      margin-top:14px;
      font-weight:800;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="/images/femifresh-logo.jpg" alt="FemiFresh">
    <h1>Staff Login</h1>
    <p>Limited admin access for orders and joining-fee approval only.</p>

    <form id="loginForm">
      <input name="email" type="email" placeholder="Staff email" required>
      <input name="password" type="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div class="error" id="errorBox"></div>
  </main>

<script>
loginForm.addEventListener("submit", async e => {
  e.preventDefault();

  const fd = new FormData(loginForm);

  const res = await fetch("/api/staff/login", {
    method:"POST",
    credentials:"include",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email: fd.get("email"),
      password: fd.get("password")
    })
  });

  const data = await res.json().catch(() => ({}));

  if (!data.success) {
    errorBox.style.display = "block";
    errorBox.textContent = data.message || "Login failed.";
    return;
  }

  location.href = "/admin/staff.html";
});
</script>
    <script src="/js/orders-admin-hard-lock.js?v=5100"></script>
    <script src="/js/orders-admin-route-fix.js?v=5300"></script>
</body>
</html>
