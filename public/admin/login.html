<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login - FemiFresh</title>
  <link rel="stylesheet" href="/css/femifresh-system.css">
</head>
<body>
  <main class="ff-container ff-section" style="max-width:560px">
    <form id="adminLogin" class="ff-card ff-form">
      <a class="ff-brand" href="/"><img src="/images/femifresh-logo.jpg" alt="">FemiFresh Admin</a>
      <h1 class="ff-page-title" style="font-size:42px">Admin Login</h1>
      <label class="ff-field">Email<input class="ff-input" name="email" type="email" autocomplete="username" required></label>
      <label class="ff-field">Password<input class="ff-input" name="password" type="password" autocomplete="current-password" required></label>
      <button class="ff-btn">Login</button>
    </form>
  </main>
  <script src="/js/femifresh-ui.js"></script>
  <script src="/js/admin-platform.js"></script>
</body>
</html>
