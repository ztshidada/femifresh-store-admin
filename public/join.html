<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Join FemiFresh</title>
  <link rel="icon" href="/images/femifresh-logo.jpg">
  <link rel="stylesheet" href="/css/femifresh-system.css">
</head>
<body>
  <header class="ff-header">
    <nav class="ff-container ff-nav">
      <a class="ff-brand" href="/"><img src="/images/femifresh-logo.jpg" alt="">FemiFresh</a>
      <div class="ff-links open"><a href="/products">Products</a><a href="/login">Distributor Login</a></div>
    </nav>
  </header>
  <main class="ff-container ff-section ff-grid two">
    <section class="ff-card ff-stack">
      <h1 class="ff-page-title">Become a Distributor</h1>
      <p class="ff-lead">Create your account, pay the once-off R100 joining fee manually, then admin approves your dashboard access.</p>
      <div class="ff-empty"><strong>Manual joining fee:</strong> R100. Send proof of payment to WhatsApp 0632180372 using your registered email as reference.</div>
    </section>
    <form id="affiliateSignup" class="ff-card ff-form">
      <h2>Create Account</h2>
      <label class="ff-field">First name<input class="ff-input" name="firstName" autocomplete="given-name" required></label>
      <label class="ff-field">Last name<input class="ff-input" name="lastName" autocomplete="family-name" required></label>
      <label class="ff-field">Phone<input class="ff-input" name="phone" autocomplete="tel" required></label>
      <label class="ff-field">Email<input class="ff-input" name="email" type="email" autocomplete="email" required></label>
      <label class="ff-field">Password<input class="ff-input" name="password" type="password" autocomplete="new-password" required></label>
      <label class="ff-field">Sponsor code optional<input class="ff-input" name="sponsorCode"></label>
      <button class="ff-btn">Sign Up</button>
    </form>
  </main>
  <script src="/js/femifresh-ui.js"></script>
  <script src="/js/affiliate-platform.js"></script>
</body>
</html>
