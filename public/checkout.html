<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Checkout - FemiFresh</title><link rel="icon" href="/images/femifresh-logo.jpg"><link rel="stylesheet" href="/css/femifresh-system.css"></head><body data-page="checkout"><header class="ff-header"><nav class="ff-container ff-nav"><a class="ff-brand" href="/"><img src="/images/femifresh-logo.jpg" alt="">FemiFresh</a><button class="ff-menu" data-menu>Menu</button><div class="ff-links" data-links><a href="/products">Products</a><a href="/cart">Cart (<span data-cart-count>0</span>)</a><a class="active" href="/checkout">Checkout</a></div></nav></header><main class="ff-container ff-section ff-grid two"><form id="checkoutForm" class="ff-card ff-form"><h1 class="ff-page-title" style="font-size:42px">Checkout</h1><div class="ff-grid two"><label class="ff-field">First Name<input name="firstName" required></label><label class="ff-field">Last Name<input name="lastName" required></label></div><label class="ff-field">Email<input name="email" type="email" required></label><label class="ff-field">Phone<input name="phone" required></label><label class="ff-field">Locker/Paxi/Nearest mall<input name="lockerOrMall"></label><label class="ff-field">Address<input name="address" required></label><div class="ff-grid two"><label class="ff-field">City<input name="city" required></label><label class="ff-field">Region<input name="region" required></label></div><div class="ff-grid two"><label class="ff-field">Country<input name="country" value="South Africa" required></label><label class="ff-field">Postal Code<input name="postalCode"></label></div><label class="ff-field">Delivery Method<select id="deliveryMethodId" name="deliveryMethodId"></select></label><label class="ff-field">Referral Code<input name="referralCode"></label><label class="ff-field">Discount/Campaign Code<input name="discountCode"></label><button class="ff-btn">Place Manual Payment Order</button></fo
