<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cart - FemiFresh</title>
  <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/femifresh-unified.css">
  <link rel="stylesheet" href="/css/femifresh-mobile-system.css">
  <script src="/js/store-manual-checkout.js"></script>
  <link rel="stylesheet" href="/css/femi-senafix-style.css">
  <link rel="stylesheet" href="/css/femi-store-stable.css">
</head>
<body>



<header class="ff-site-header">
  <nav class="ff-nav">
    <a class="ff-brand" href="/">
      <img src="/images/femifresh-logo.jpg" alt="FemiFresh logo">
      <span>FemiFresh</span>
    </a>

    <button class="ff-menu" id="ffMenuBtn" aria-label="Open menu">☰</button>

    <div class="ff-navlinks" id="ffNavLinks">
      <a href="/">Home</a>
      <a href="/products.html">Products</a>
      <a href="/cart.html">Cart</a>
      <a href="/policies.html">Policy</a>
      <a href="/contact.html">Contact</a>
    </div>
  </nav>
</header>

<main>
  <section class="page-hero small-hero">
    <div class="container">
      <p class="eyebrow">SHOPPING CART</p>
      <h1>Your FemiFresh Cart</h1>
      <p>Review your selected items, update quantities and continue to secure checkout.</p>
    </div>
  </section>

  <section class="container shop-layout">
    <div class="shop-main">
      <div class="section-head">
        <h2>Cart Items</h2>
        <button class="ghost-btn" onclick="clearCartFlow()">Clear cart</button>
      </div>
      <div id="cartItems"></div>
    </div>

    <aside class="shop-side">
      <div class="summary-card">
        <h3>Order Summary</h3>
        <div id="cartSummary"></div>
        <div class="summary-actions">
          <a class="primary-btn full-btn" href="/checkout">Proceed to Checkout</a>
          <a class="secondary-btn full-btn" href="/products">Continue Shopping</a>
        </div>
      </div>
    </aside>
  </section>
</main>

<script src="/js/store.js"></script>
<script src="/js/mobile-header-fix.js"></script>
  


<script>
  const ffMenuBtn = document.getElementById("ffMenuBtn");
  const ffNavLinks = document.getElementById("ffNavLinks");
  if (ffMenuBtn && ffNavLinks) {
    ffMenuBtn.addEventListener("click", () => ffNavLinks.classList.toggle("open"));
  }
</script>
  <script src="/js/femifresh-mobile-system.js"></script>
  <script src="/js/femi-senafix-style.js"></script>
  <script src="/js/femi-store-stable.js"></script>
</body>
</html>
